name: Build CleanLedger (Windows)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Tauri Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Generate Tauri icons from SVG
        working-directory: apps/desktop
        run: npx tauri icon public/cleanledger.svg

      - name: Build Tauri application
        working-directory: apps/desktop
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cleanledger-windows-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*latest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish rolling release on main
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest-build
          name: CleanLedger Latest Build
          body: |
            Otomatik Windows derlemesi — commit `${{ github.sha }}`
            `main` dalına her push sonrası güncellenir.
          allowUpdates: true
          makeLatest: true
          prerelease: true
          artifacts: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe,apps/desktop/src-tauri/target/release/bundle/msi/*.msi,apps/desktop/src-tauri/target/release/bundle/nsis/*latest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: CleanLedger ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
